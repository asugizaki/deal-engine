name: Deal Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run deal pipeline
        run: node src/processDeals.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_AI: ${{ secrets.TELEGRAM_AI }}
          TELEGRAM_SAAS: ${{ secrets.TELEGRAM_SAAS }}
          TELEGRAM_GENERAL: ${{ secrets.TELEGRAM_GENERAL }}

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache.json
          git commit -m "update cache" || exit 0
          git push
